[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://everaura-creations.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/submit-order"
  to = "https://everaura-creations.onrender.com/submit-order"
  status = 200
  force = true

[[redirects]]
  from = "/static/uploads/*"
  to = "https://everaura-creations.onrender.com/static/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
